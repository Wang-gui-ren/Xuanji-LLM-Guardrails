name: astrbot_plugin_xuanji_guardrail
display_name: 璇玑大模型护栏 
desc: 璇玑大模型护栏是一个面向 AstrBot 与 Agent 工具链的大模型安全护栏插件，提供输入护栏、输出护栏、工具链防护、知识库沉淀、审计日志与安全演化能力。
short_desc: Guardrail plugin for AstrBot and LLM agents
version: v1.0.0
author: QingXuan
repo: https://github.com/Wang-gui-ren/Xuanji-LLM-Guardrails
astrbot_version: ">=4.16,<5"
support_platforms:
  - aiocqhttp
  - qq_official
  - qq_official_webhook
  - telegram
  - wecom
  - wecom_ai_bot
  - lark
  - dingtalk
  - discord
  - slack
  - kook
  - vocechat
  - weixin_official_account
  - weixin_oc
  - satori
  - misskey
  - line
  - matrix
  - mattermost
